<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio AI Builder</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0d1117;
      }
      #root {
        height: 100%;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="/runtime-config.js"></script>
    <script>
      window.__RUNTIME_CONFIG__ = window.__RUNTIME_CONFIG__ || {};
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
