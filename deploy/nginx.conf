# Extract the preview appId from the Referer header so that sub-resource
# requests originating from a /preview/{appId}/ iframe can be routed back
# through the preview proxy instead of being served as web-studio static files.
map $http_referer $preview_app_id {
    "~*/preview/(\d+)"  $1;
    default             "";
}

server {
    listen 80 default_server;
    server_name _;

    # Serve the web studio static files
    root /data/web-studio;
    index index.html;

    # SPA fallback with preview iframe sub-resource detection.
    # When the Referer indicates the request comes from a preview iframe,
    # redirect to /preview/{appId}/... so the bridge routes it to the
    # correct dev server. This handles Vite's absolute paths like
    # /src/main.tsx, /@vite/client, /node_modules/.vite/deps/*, etc.
    location / {
        if ($preview_app_id != "") {
            return 302 /preview/$preview_app_id$request_uri;
        }
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Electron bridge server
    location /invoke {
        proxy_pass http://127.0.0.1:4310;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /events {
        proxy_pass http://127.0.0.1:4310;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE-specific settings
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /channels {
        proxy_pass http://127.0.0.1:4310;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:4310;
    }

    # Export endpoint — zip download
    location /export/ {
        proxy_pass http://127.0.0.1:4310;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Preview proxy — supports WebSocket upgrades for HMR
    location /preview/ {
        proxy_pass http://127.0.0.1:4310;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }
}
